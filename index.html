<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Full screen centering setup */
    body, html {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center; /* Centers horizontally */
      align-items: center;     /* Centers vertically */
      background-color: #f8f9fa;
      font-family: sans-serif;
    }

    .btn-wrapper {
      display: flex;
      gap: 15px;
      justify-content: center;
      padding: 30px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      text-align: center;
      display: inline-block;
    }

    /* Primary Button */
    .btn-client {
      background-color: #0056b3;
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(0, 86, 179, 0.3);
    }
    .btn-client:hover {
      background-color: #004494;
      transform: translateY(-3px);
    }

    /* Secondary Button */
    .btn-pay {
      background-color: #28a745;
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
    }
    .btn-pay:hover {
      background-color: #218838;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

  <div class="btn-wrapper">
    <a href="https://client.at.dz" class="btn btn-client">فضاء الزبون (Client)</a>
    <a href="https://paiement.at.dz/AR/index.php?p=voucher_internet" class="btn btn-pay">تعبئة الإنترنت (Voucher)</a>
  </div>

</body>
</html>
